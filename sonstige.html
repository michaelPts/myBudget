<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <script>
    // Verhindert ein kurzes Aufblitzen des Hellmodus beim Laden/Seitenwechsel
    // im Dunkelmodus: liest den gespeicherten Modus synchron VOR dem ersten
    // Rendern aus und setzt die Klasse direkt am <html>-Element (das schon
    // existiert, während <body> hier noch nicht geparst ist).
    if (localStorage.getItem("budgetrechnerModus") === "dunkel") {
      document.documentElement.classList.add("dunkel-modus");
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Budgetrechner">
  <title>Sonstige Ausgaben – Budgetrechner</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
</head>
<body>

  <div class="container">
    <div class="kopfzeile">
      <h1>
        <span class="icon-wallet" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 7a2 2 0 0 1 2-2h9a1 1 0 0 1 1 1v2"/>
            <rect x="3" y="8" width="18" height="11" rx="2"/>
            <path d="M16 13.5h3"/>
          </svg>
        </span>
        Budgetrechner
      </h1>
      <button type="button" id="modus-umschalten" class="btn btn-modus" title="Dunkelmodus umschalten">🌙</button>
    </div>

    <!-- ================= NAVIGATION ================= -->
    <nav class="nav-leiste">
      <a class="nav-link" href="index.html">Start</a>
      <a class="nav-link" href="kategorien.html">Laufende Ausgaben</a>
      <a class="nav-link" href="sonstige.html">Sonstige</a>
    </nav>

    <!-- ================= ÜBERSICHTSTABELLE ================= -->
    <!-- Zeigt alle sonstigen Ausgaben mit Zwischensumme. Wird von script.js
         (rendereUebersichtstabelle) automatisch befüllt; bleibt leer, solange
         keine sonstigen Ausgaben angelegt sind. -->
    <section class="karte uebersicht-karte" data-tabelle-modus="sonstige">
      <h2>Übersicht: Sonstige Ausgaben</h2>

      <button type="button" class="btn kategorie-umschalten" aria-expanded="false" data-label-zu="Tabelle anzeigen" data-label-offen="Tabelle einklappen">
        <span class="umschalten-text">Tabelle anzeigen</span>
        <span class="umschalten-pfeil" aria-hidden="true">▾</span>
      </button>

      <div class="kategorie-details">
      <div class="tabelle-wrapper">
        <table class="uebersicht-tabelle">
          <tbody class="uebersicht-tabelle-body"></tbody>
        </table>
      </div>
      <p class="leer-hinweis">Noch keine sonstigen Ausgaben vorhanden.</p>
      </div>
    </section>

    <!-- ================= SONSTIGE-AUSGABEN-KARTE ================= -->
    <!-- Freie, eigene Ausgaben ohne feste Kategorie. script.js erkennt diese
         Karte über "ausgaben-karte" + data-ziel="sonstige" genau wie die
         Kategorie-Karten auf kategorien.html. -->
    <section class="karte ausgaben-karte" data-ziel="sonstige">
      <div class="kategorie-kopf">
        <h2>Sonstige Ausgaben</h2>
        <p class="kategorie-zwischensumme">Zwischensumme: <span class="zwischensumme-betrag">0,00 €</span></p>
      </div>

      <!-- Horizontales Balkendiagramm dieser Kategorie, größte Ausgabe oben.
           Wird von script.js (rendereKategorieBalken) befüllt und bei leerer
           Kategorie automatisch ausgeblendet. -->
      <div class="kategorie-balken"></div>

      <!-- Ein-/Ausklapp-Button: Formular und Liste sind standardmäßig
           eingeklappt, damit die Kachel kompakt bleibt. script.js schaltet
           dazu die Klasse "offen" am darunterliegenden Bereich um. -->
      <button type="button" class="btn kategorie-umschalten" aria-expanded="false" data-label-zu="Ausgaben bearbeiten" data-label-offen="Ausgaben einklappen">
        <span class="umschalten-text">Ausgaben bearbeiten</span>
        <span class="umschalten-pfeil" aria-hidden="true">▾</span>
      </button>

      <div class="kategorie-details">
      <form class="ausgabe-formular" novalidate>
        <div class="feld-gruppe">
          <label for="sonstige-name-input">Name</label>
          <input type="text" id="sonstige-name-input" class="ausgabe-name-input" placeholder="z. B. Geschenke" autocomplete="off">
          <p class="fehler-text name-fehler"></p>
        </div>
        <div class="feld-gruppe">
          <label for="sonstige-betrag-input">Betrag pro Monat</label>
          <input type="text" id="sonstige-betrag-input" class="ausgabe-betrag-input" placeholder="z. B. 25" inputmode="decimal" autocomplete="off">
          <p class="fehler-text betrag-fehler"></p>
        </div>
        <button type="submit" class="btn btn-primary">+ Ausgabe hinzufügen</button>
      </form>

      <ul class="ausgaben-liste"></ul>
      <p class="leer-hinweis">Noch keine sonstigen Ausgaben angelegt.</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
